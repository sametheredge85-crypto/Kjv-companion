        function runHarmony() {
            const term = document.getElementById("searchInput").value.toLowerCase().trim();
            const output = document.getElementById("output");
            output.innerHTML = "";

            if (!term) return;

            // Search both verse text and reference
            const results = bibleData.filter(v =>
                v.text.toLowerCase().includes(term) ||
                v.ref.toLowerCase().includes(term)
            );

            if (results.length > 0) {
                output.innerHTML = `<p style="color:#8b4513;font-style:italic;">${results.length} verse${results.length > 1 ? 's' : ''} found:</p>`;
                results.forEach(v => {
                    output.innerHTML += `<div class="verse-card"><strong>${v.ref}</strong><br>${v.text}</div>`;
                });
            } else {
                output.innerHTML = "<p>No results found for that term. Try a single word from the verse text — e.g., <em>elect</em>, <em>chosen</em>, <em>grace</em>, <em>regeneration</em>, <em>predestinate</em>, <em>sheep</em>, <em>quicken</em>.</p>";
            }
        }
