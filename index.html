<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KJV Companion</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
      background: #f9f9f9;
    }
    header {
      background: #343a40;
      color: white;
      padding: 20px 0;
    }
    header h1 {
      margin: 0;
    }
    .container {
      margin: 30px;
      padding: 20px;
      background: white;
      box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.1);
    }
    footer {
      margin-top: 20px;
      background: #343a40;
      color: white;
      padding: 10px 0;
    }
    .footer-text {
      margin: 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to KJV Companion</h1>
    <p>Your go-to Bible Companion</p>
  </header>
  <div class="container">
    <h2>Bible Data Integration</h2>
    <p>This page is powered by <strong>bibleData.js</strong>.</p>
    <p>View the raw data and interact with it through this page.</p>
    <div id="main">
      <button onclick="fetchBibleData()">Load Bible Data</button>
      <div id="output" style="margin-top: 20px; text-align: left;"></div>
    </div>
  </div>
  <footer>
    <p class="footer-text">&copy; 2026 KJV Companion</p>
  </footer>
  <script>
    // Fetch and display data from bibleData.js
    async function fetchBibleData() {
      const output = document.getElementById('output');
      output.textContent = 'Loading Bible Data...';

      try {
        // Fetch data from bibleData.js URL
        const response = await fetch('https://github.com/sametheredge85-crypto/kjv-companion/blob/main/bibleData.js');
        
        if (!response.ok) throw new Error('Failed to fetch Bible data.');

        const data = await response.text();
        output.textContent = data;
      } catch (error) {
        output.textContent = `Error: ${error.message}`;
      }
    }
  </script>
</body>
</html>
