<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJV Harmony Companion</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #f4ece2; font-family: 'Georgia', serif; color: #2c2c2c; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 2px solid #8b4513; padding: 20px; background: white; }
        h1 { color: #8b4513; text-align: center; border-bottom: 2px solid #8b4513; }
        input { width: 70%; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; background: #8b4513; color: white; border: none; cursor: pointer; }
        #output { margin-top: 30px; line-height: 1.6; }
        .verse-card { margin-bottom: 20px; padding: 10px; border-left: 4px solid #8b4513; background: #fafafa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>KJV Harmony Companion</h1>
        <p style="text-align: center; font-style: italic;">"The scripture cannot be broken." — John 10:35</p>
        
        <div style="text-align: center;">
            <input type="text" id="searchInput" placeholder="Enter a word or topic...">
            <button onclick="runHarmony()">Search</button>
        </div>

        <div id="output"></div>
    </div>

    <script>
        // This is your internal "Furniture of God" - expanded Bible verses
        const bibleData = [
            { ref: "John 10:35", text: "If he called them gods, unto whom the word of God came, and the scripture cannot be broken;" },
            { ref: "2 Timothy 3:16", text: "All scripture is given by inspiration of God, and is profitable for doctrine, for reproof, for correction, for instruction in righteousness:" },
            { ref: "2 Timothy 3:17", text: "That the man of God may be perfect, throughly furnished unto all good works." },
            { ref: "Psalm 119:120", text: "My flesh trembleth for fear of thee; and I am afraid of thy judgments." },
            { ref: "Ezra 9:4", text: "Then were assembled unto me every one that trembled at the words of the God of Israel, because of the transgression of those that had been carried away; and I sat astonied until the evening sacrifice." },
            { ref: "Ezra 10:3", text: "Now therefore let us make a covenant with our God to put away all the wives, and such as are born of them, according to the counsel of my lord, and of those that tremble at the commandment of our God; and let it be done according to the law." },
            { ref: "Isaiah 66:2", text: "For all those things hath mine hand made, and all those things have been, saith the LORD: but to this man will I look, even to him that is poor and of a contrite spirit, and trembleth at my word." },
            { ref: "Isaiah 66:5", text: "Hear the word of the LORD, ye that tremble at his word; Your brethren that hated you, that cast you out for my name's sake, said, Let the LORD be glorified: but he shall appear to your joy, and they shall be ashamed." },
            { ref: "Habakkuk 3:16", text: "When I heard, my belly trembled; my lips quivered at the voice: rottenness entered into my bones, and I trembled in myself, that I might rest in the day of trouble: when he cometh up unto the people, he will invade them with his troops." },
            { ref: "Acts 9:6", text: "And he trembling and astonished said, Lord, what wilt thou have me to do? And the Lord said unto him, Arise, and go into the city, and it shall be told thee what thou must do." },
            { ref: "Philippians 2:12", text: "Wherefore, my beloved, as ye have always obeyed, not as in my presence only, but now much more in my absence, work out your own salvation with fear and trembling." },
            { ref: "James 2:19", text: "Thou believest that there is one God; thou doest well: the devils also believe, and tremble." },
            { ref: "Deuteronomy 2:25", text: "This day will I begin to put the dread of thee and the fear of thee upon the nations that are under the whole heaven, who shall hear report of thee, and shall tremble, and be in anguish because of thee." },
            { ref: "1 Chronicles 16:30", text: "Fear before him, all the earth: the world also shall be stable, that it be not moved." },
            { ref: "Psalm 96:9", text: "O worship the LORD in the beauty of holiness: fear before him, all the earth." },
            { ref: "Psalm 99:1", text: "The LORD reigneth; let the people tremble: he sitteth between the cherubims; let the earth be moved." },
            { ref: "Psalm 114:7", text: "Tremble, thou earth, at the presence of the Lord, at the presence of the God of Jacob;" },
            { ref: "Isaiah 64:2", text: "As when the melting fire burneth, the fire causeth the waters to boil, to make thy name known to thine adversaries, that the nations may tremble at thy presence!" },
            { ref: "Jeremiah 5:22", text: "Fear ye not me? saith the LORD: will ye not tremble at my presence, which have placed the sand for the bound of the sea by a perpetual decree, that it cannot pass it: and though the waves thereof toss themselves, yet can they not prevail; though they roar, yet can they not pass over it?" },
            { ref: "Jeremiah 10:10", text: "But the LORD is the true God, he is the living God, and an everlasting king: at his wrath the earth shall tremble, and the nations shall not be able to abide his indignation." },
            { ref: "Jeremiah 33:9", text: "And it shall be to me a name of joy, a praise and an honour before all the nations of the earth, which shall hear all the good that I do unto them: and they shall fear and tremble for all the goodness and for all the prosperity that I procure unto it." },
            { ref: "Ezekiel 26:16", text: "Then all the princes of the sea shall come down from their thrones, and lay away their robes, and put off their broidered garments: they shall clothe themselves with trembling; they shall sit upon the ground, and shall tremble at every moment, and be astonished at thee." },
            { ref: "Ezekiel 26:18", text: "Now shall the isles tremble in the day of thy fall; yea, the isles that are in the sea shall be troubled at thy departure." },
            { ref: "Daniel 6:26", text: "I make a decree, That in every dominion of my kingdom men tremble and fear before the God of Daniel: for he is the living God, and stedfast for ever, and his kingdom that which shall not be destroyed, and his dominion shall be even unto the end." },
            { ref: "Joel 2:1", text: "Blow ye the trumpet in Zion, and sound an alarm in my holy mountain: let all the inhabitants of the land tremble: for the day of the LORD cometh, for it is nigh at hand;" },
            { ref: "Joel 2:10", text: "The earth shall quake before them; the heavens shall tremble: the sun and the moon shall be dark, and the stars shall withdraw their shining:" },
            { ref: "Amos 8:8", text: "Shall not the land tremble for this, and every one mourn that dwelleth therein? and it shall rise up wholly as a flood; and it shall be cast out and drowned, as by the flood of Egypt." }
        ];

        function runHarmony() {
            const term = document.getElementById("searchInput").value.toLowerCase();
            const output = document.getElementById("output");
            output.innerHTML = "";

            if (!term) return;

            // Filters based on the "Whole Counsel" without outside bias
            const results = bibleData.filter(v => v.text.toLowerCase().includes(term));

            if (results.length > 0) {
                results.forEach(v => {
                    output.innerHTML += `<div class="verse-card"><strong>${v.ref}</strong><br>${v.text}</div>`;
                });
            } else {
                output.innerHTML = "<p>No results found in current context. Keep searching the scriptures.</p>";
            }
        }
    </script>
</body>
</html>
