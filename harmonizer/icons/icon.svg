<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <!-- Book shape -->
  <g transform="translate(256, 256)">
    <!-- Open book pages -->
    <path d="M-120,-80 L-120,80 Q-60,60 0,80 L0,-80 Q-60,-100 -120,-80" fill="#f7fafc" stroke="#c9a227" stroke-width="4"/>
    <path d="M120,-80 L120,80 Q60,60 0,80 L0,-80 Q60,-100 120,-80" fill="#f7fafc" stroke="#c9a227" stroke-width="4"/>
    <!-- Spine -->
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#c9a227" stroke-width="4"/>
    <!-- Text lines on left page -->
    <line x1="-100" y1="-50" x2="-20" y2="-50" stroke="#1a365d" stroke-width="2" opacity="0.5"/>
    <line x1="-100" y1="-30" x2="-20" y2="-30" stroke="#1a365d" stroke-width="2" opacity="0.5"/>
    <line x1="-100" y1="-10" x2="-20" y2="-10" stroke="#1a365d" stroke-width="2" opacity="0.5"/>
    <line x1="-100" y1="10" x2="-20" y2="10" stroke="#1a365d" stroke-width="2" opacity="0.5"/>
    <line x1="-100" y1="30" x2="-20" y2="30" stroke="#1a365d" stroke-width="2" opacity="0.5"/>
    <line x1="-100" y1="50" x2="-20" y2="50" stroke="#1a365d" stroke-width="2" opacity="0.5"/>
    <!-- Text lines on right page -->
    <line x1="20" y1="-50" x2="100" y2="-50" stroke="#1a365d" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="-30" x2="100" y2="-30" stroke="#1a365d" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="-10" x2="100" y2="-10" stroke="#1a365d" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="10" x2="100" y2="10" stroke="#1a365d" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="30" x2="100" y2="30" stroke="#1a365d" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="50" x2="100" y2="50" stroke="#1a365d" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Cross symbol -->
  <g transform="translate(256, 260)">
    <rect x="-8" y="-60" width="16" height="40" fill="#c9a227"/>
    <rect x="-20" y="-45" width="40" height="12" fill="#c9a227"/>
  </g>
  <!-- "KJV" text -->
  <text x="256" y="420" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#f7fafc" text-anchor="middle">KJV</text>
</svg>
